# fly.toml app configuration file generated for twtodos-sparkling-forest-6646 on 2025-05-13T22:39:56-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'twtodos-sparkling-forest-6646'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
