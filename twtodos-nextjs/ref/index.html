<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TWTodos - Todo App</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <!-- Sortable.js for reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="bg-primary text-white py-3">
      <div class="container">
        <h1>TWTodos</h1>
      </div>
    </header>
    <main class="container my-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h2 class="h5 mb-0">Add New Todo</h2>
            </div>
            <div class="card-body">
              <form id="todoForm">
                <div class="input-group mb-3">
                  <input
                    type="text"
                    id="todoInput"
                    class="form-control"
                    placeholder="Enter your todo..."
                    aria-label="Todo"
                    aria-describedby="add-button"
                    minlength="3"
                    required
                  />
                  <button class="btn btn-primary" type="submit" id="addButton">
                    <i class="bi bi-plus-lg"></i> Add
                  </button>
                </div>
                <div class="invalid-feedback" id="todoInputFeedback">
                  Todo must have at least 3 characters and start with a capital
                  letter.
                </div>
              </form>
            </div>
          </div>

          <div class="card mt-4">
            <div
              class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
            >
              <h2 class="h5 mb-0">My Todos</h2>
              <small class="text-white">Drag to reorder</small>
            </div>
            <div class="card-body p-0">
              <ul id="todoList" class="list-group list-group-flush">
                <!-- Todo items will be inserted here -->
              </ul>
            </div>
            <div class="card-footer bg-white text-end">
              <small id="todoStats">0 todos</small>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
